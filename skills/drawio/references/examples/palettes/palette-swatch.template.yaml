meta:
  title: Palette swatch
  description: Standard eight-cell palette preview
  theme: tech-blue
  palette: okabe-ito
  layout: horizontal
  routing: orthogonal

nodes:
  - id: swatch1
    label: 1. color
    type: service
    bounds: { x: 64, y: 64, width: 184, height: 64 }
    style: { fillColor: $palette1-fill, strokeColor: $palette1-stroke, fontColor: $palette1-text }
  - id: swatch2
    label: 2. color
    type: service
    bounds: { x: 280, y: 64, width: 184, height: 64 }
    style: { fillColor: $palette2-fill, strokeColor: $palette2-stroke, fontColor: $palette2-text }
  - id: swatch3
    label: 3. color
    type: service
    bounds: { x: 496, y: 64, width: 184, height: 64 }
    style: { fillColor: $palette3-fill, strokeColor: $palette3-stroke, fontColor: $palette3-text }
  - id: swatch4
    label: 4. color
    type: service
    bounds: { x: 712, y: 64, width: 184, height: 64 }
    style: { fillColor: $palette4-fill, strokeColor: $palette4-stroke, fontColor: $palette4-text }
  - id: swatch5
    label: 5. color
    type: service
    bounds: { x: 64, y: 192, width: 184, height: 64 }
    style: { fillColor: $palette5-fill, strokeColor: $palette5-stroke, fontColor: $palette5-text }
  - id: swatch6
    label: 6. color
