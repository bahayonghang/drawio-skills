    bounds: { x: 496, y: 192, width: 184, height: 64 }
    style: { fillColor: $palette7-fill, strokeColor: $palette7-stroke, fontColor: $palette7-text }
  - id: swatch8
    label: 8. color
    type: service
    bounds: { x: 712, y: 192, width: 184, height: 64 }
    style: { fillColor: $palette8-fill, strokeColor: $palette8-stroke, fontColor: $palette8-text }

edges:
  - { from: swatch1, to: swatch2, type: primary }
  - { from: swatch3, to: swatch4, type: data }
